<html>

<body> 
    
<title>- Datapack -</title>
        <header id="theHeader">
            <p>
                <button type="button" onclick="hub()">Home</button>
                <button type="button" onclick="datapack()">Datapacks</button>
                <button type="button" onclick="shortcut()">Shortcuts</button>
            </p>

<br>

<p>

</p>

            <button class="static"style="cursor: default; display: block; background-color: white; color: black;">© Nat3z</button>
        </footer>
<script>


//Insert Code Here
document.addEventListener('contextmenu', event => event.preventDefault());

function datapack() {
    window.location.replace("./")
}
function hub() {
    window.location.replace("../")
}
function news() {
    window.location.replace("./news/overhaul.html")
}
function uhc() {
    window.location.replace("./uhc/")
}
function shortcut() {
        window.location.replace("../shortcuts/")
}
window.onscroll = function() {headerstick()};

var header = document.getElementById("theHeader");

var sticky = header.offsetTop;

function headerstick() {
  if (window.pageYOffset > sticky) {
    header.classList.add("sticky");
  } else {
    header.classList.remove("sticky");
  }
} 
</script>
