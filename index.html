<!DOCTYPE html> 
<html>
    <link rel="stylesheet" href="resetStylesheet.css">
    <meta property="og:url" content="https://nat3z.github.io/">
    <meta property="og:title" content="Nat3z.github.io">
    <meta property="og:description" content="Homepage For Nat3z's Website.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#1f6db3">
<body> 
    
<title>- Home -</title>
        <header id="theHeader">
            <p>
                <button type="button" onclick="hub()">Home</button>
                <button type="button" onclick="datapack()">Datapacks</button>
                <button type="button" onclick="shortcut()">Shortcuts</button>
            </p>
        </header>
        <br>
        <h1 style="color: black; font-size: larger; font-weight: bolder;">UPDATES</h1>
        <br><br>
    <p>
       <button class="static" onclick="news()" style="cursor: pointer;">11/23/20 <br>New Website Overhaul</button>

    </p>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <footer>
        <button class="static"style="cursor: default; display: block; background-color: white; color: black;">© Nat3z</button>
    </footer>
<script> 
    document.addEventListener('contextmenu', event => event.preventDefault());

    function datapack() {
        window.location.replace("./datapack/")
    }
    function hub() {
        window.location.replace("./")
    }
    function news() {
        window.location.replace("./news/overhaul")
    }
    function shortcut() {
        window.location.replace("./shortcuts/")
    }

    window.onscroll = function() {headerstick()};

    var header = document.getElementById("theHeader");

    var sticky = header.offsetTop;

    function headerstick() {
      if (window.pageYOffset > sticky) {
        header.classList.add("sticky");
      } else {
        header.classList.remove("sticky");
      }
    } 
</script> 

</body> 
</html>
