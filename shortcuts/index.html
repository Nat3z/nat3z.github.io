<!DOCTYPE html> 
<html>
    <link rel="stylesheet" href="../resetStylesheet.css">
<body> 
    
<title>Nat3z.github.io Shortcuts Page</title>
        <header id="theHeader">
            <p>
                <button type="button" onclick="hub()">Home</button>
                <button type="button" onclick="datapack()">Datapacks</button>
                <button type="button" onclick="shortcut()">Challege Roulette</button>
            </p>
        </header>
        <br>
        <a href="https://nat3z.github.io/challenge-roulette/index.html">Not Redirected Yet? Click Me</a>
        <meta http-equiv = "refresh" content = "0; url = https://nat3z.github.io/challenge-roulette/index.html" />

<script> 

//Insert Code Here
document.addEventListener('contextmenu', event => event.preventDefault());

function datapack() {
    window.location.replace("../datapack/")
}
function hub() {
    window.location.replace("../")
}
function news() {
    window.location.replace("../news/overhaul.html")
}
function shortcut() {
        window.location.replace("https://nat3z.github.io/challenge-roulette/index.html")
}
window.onscroll = function() {headerstick()};

var header = document.getElementById("theHeader");

var sticky = header.offsetTop;

function headerstick() {
  if (window.pageYOffset > sticky) {
    header.classList.add("sticky");
  } else {
    header.classList.remove("sticky");
  }
} 
</script> 

</body> 
</html>
